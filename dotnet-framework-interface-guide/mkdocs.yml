site_name: .NET Framework Interface Guide
theme:
  favicon: documentation-assets/images/favicon-32.png
  logo: documentation-assets/images/dyalog-logo_white.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - navigation.indexes
  name: material
  font:
    text: Be Vietnam Pro
extra_css:
  - documentation-assets/css/main.css
  - documentation-assets/css/extra.css
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - privacy
  - search
  - macros
  - site-urls
  - caption:
      table:
        enable: true
        start_index: 1
        increment_index: 1
        position: bottom
        reference_text: 'Table {index}'
        caption_prefix: 'Table {index}:' 
extra:
  version_maj: 21
  version_majmin: 21.0
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - abbr
  - footnotes
  - md_in_html
  - markdown_tables_extended
  - toc:
      title: On this page
nav:
  - index.md
  - Introduction: introduction.md
  - Installation: installation.md
  - .NET Classes:
      - dotnet-classes/index.md
      - Locating .NET Classes and Assemblies: dotnet-classes/locating-dotnet-classes-and-assemblies.md
      - Using .NET Classes: dotnet-classes/using-dotnet-classes.md
      - Browsing .NET Classes: dotnet-classes/browsing-dotnet-classes.md
      - Advanced Techniques: dotnet-classes/advanced-techniques.md
      - Example Usage: dotnet-classes/example-usage.md
      - Enumerations: dotnet-classes/enumerations.md
      - Handling Pointers with Dyalog.ByRef: dotnet-classes/handling-pointers-with-dyalogbyref.md
      - DECF Conversion: dotnet-classes/decf-conversion.md
  - Using Windows Forms: using-windows-forms
  - Windows Presentation Foundation:
      - windows-presentation-foundation/index.md
      - Temperature Converter Tutorial: windows-presentation-foundation/temperature-converter-tutorial.md
      - Data Binding: windows-presentation-foundation/data-binding.md
  - Dyalog and IIS: dyalog-and-iis.md
  - Calling Web Services: calling-web-services.md
  - Implementation Details:
      - implementation-details/index.md
      - Isolation Mode: implementation-details/isolation-mode.md
      - Workspace Size: implementation-details/workspace-size.md
      - Structure of the Active Workspace: implementation-details/structure-of-the-active-workspace.md
      - Threading: implementation-details/threading.md
      - Debugging an APL.NET Class: implementation-details/debugging-an-apldotnet-class.md
      - The web.config File: implementation-details/the-webconfig-file.md