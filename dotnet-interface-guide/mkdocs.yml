site_name: .NET Interface Guide
theme:
  favicon: documentation-assets/images/favicon-32.png
  logo: documentation-assets/images/dyalog-logo_white.svg
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - navigation.indexes
    - navigation.footer
  name: material
  font:
    text: Be Vietnam Pro
extra_css:
  - documentation-assets/css/main.css
  - documentation-assets/css/extra.css
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - privacy
  - search
  - macros
  - site-urls
  - caption:
      table:
        enable: true
        start_index: 1
        increment_index: 1
        position: top
        reference_text: 'Table {index}'
        caption_prefix: 'Table {index}:' 
extra:
  version_maj: 21
  version_majmin: 21.0
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.superfences
  - pymdownx.highlight:
      pygments_lang_class: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight:
      use_pygments: false
  - attr_list
  - abbr
  - footnotes
  - md_in_html
  - markdown_tables_extended
  - toc:
      title: On this page
nav:
  - index.md
  - Installation: installation.md
  - .NET Classes: 
      - dotnet-classes/index.md
      - Locating .NET Classes and Assemblies: dotnet-classes/locating-dotnet-classes-and-assemblies.md
      - Using .NET Classes: dotnet-classes/using-dotnet-classes.md
      - Advanced Techniques: dotnet-classes/advanced-techniques.md
      - Example Usage: dotnet-classes/example-usage.md
      - Enumerations: dotnet-classes/enumerations.md
      - Handling Pointers with Dyalog.ByRef: dotnet-classes/handling-pointers-with-dyalogbyref.md
      - DECF Conversion: dotnet-classes/decf-conversion.md
  - APL Source Files: apl-source-files.md
  - Writing .NET Classes:
      - writing-dotnet-classes/index.md
      - Assemblies, Namespaces, and Classes: writing-dotnet-classes/assemblies-namespaces-and-classes.md
      - Tutorial: writing-dotnet-classes/tutorial.md
      - Interfaces: writing-dotnet-classes/interfaces.md
      - Creating .NET Classes with APL Source Files: writing-dotnet-classes/creating-dotnet-classes-with-apl-source-files.md